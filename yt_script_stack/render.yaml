services:
  - type: web
    name: yt-script-stack
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: none
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
