<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <title>Admin - {{video.title}}</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <div class="container">
    <p><a href="/admin?token={{token}}">← back</a></p>
    <h1>{{ video.title }}</h1>
    <p>Status: <b>{{video.status}}</b></p>
    <p><a href="{{video.url}}" target="_blank">YouTube open</a></p>

    <h2>Paste transcript</h2>
    <form method="post" action="/admin/video/.../transcript?token={{ token }}"
      <input type="hidden" name="token" value="{{token}}"/>
      <input type="hidden" name="source" value="manual_paste"/>
      <textarea name="raw_text" rows="18" style="width: 100%;" placeholder="스크립트 전문을 붙여넣으세요"></textarea>
      <div style="margin-top: 10px;">
        <button type="submit">Save & Enqueue Jobs</button>
      </div>
    </form>

    <h2>Transcripts</h2>
    <ul>
      {% for t in transcripts %}
        <li>#{{t.transcript_id}} / {{t.source}} v{{t.version}} ({{t.created_at}})</li>
      {% else %}
        <li>(none)</li>
      {% endfor %}
    </ul>

    <h3>Run jobs</h3>
    <form method="post" action="/admin/run-jobs">
      <input type="hidden" name="token" value="{{token}}"/>
      <input type="number" name="batch" value="10" min="1" max="100"/>
      <button type="submit">Run pending jobs now</button>
    </form>

  </div>
</body>
</html>
