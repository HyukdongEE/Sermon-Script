<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <title>Admin - Videos</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <div class="container">
    <h1>Admin: Videos</h1>
    <p>
      <a href="/search-ui?token={{token}}">Search UI</a>
    </p>

    <form method="post" action="/admin/run-jobs">
      <input type="hidden" name="token" value="{{token}}"/>
      <label>Run pending jobs batch:</label>
      <input type="number" name="batch" value="10" min="1" max="100"/>
      <button type="submit">Run</button>
    </form>

    <h2>Latest 200</h2>
    <table>
      <thead>
        <tr>
          <th>Published</th>
          <th>Status</th>
          <th>Title</th>
          <th>Video</th>
        </tr>
      </thead>
      <tbody>
      {% for v in videos %}
        <tr>
          <td>{{ v.published_at or "" }}</td>
          <td>{{ v.status }}</td>
          <td><a href="/admin/video/{{v.video_id}}?token={{token}}">{{ v.title }}</a></td>
          <td><a href="{{v.url}}" target="_blank">open</a></td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
